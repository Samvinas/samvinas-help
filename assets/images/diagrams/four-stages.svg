<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 440" role="img" aria-labelledby="fs-title fs-desc">
  <title id="fs-title">The Creative Problem Solving process</title>
  <desc id="fs-desc">Four stages arranged in a clockwise cycle — 1 Clarify (find the right
  problem), 2 Ideate (find many answers), 3 Develop (make ideas strong), 4 Implement
  (turn ideas into action) — each containing a small diverge-then-converge pair of
  triangles. At the centre, connected to all four stages by dashed lines, sits a box
  labelled "Assess the situation": the point you return to between stages to take stock
  and choose where to go next.</desc>
  <!--
    Diagrams carry their own background so they stay readable in dark mode.
    Replace this file (keeping the filename) to substitute your organisation's
    own version of the CPS model. Text colours are contrast-computed:
    ink #161D20 on panel #E2E7E4 (13.6:1) · caption #47555A (6.2:1) ·
    light #F2F5F4 on basalt #0F1518 (16.8:1) · arrows #47555A on paper (6.6:1).
  -->
  <defs>
    <marker id="arw" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#47555A"/>
    </marker>
  </defs>

  <rect x="1" y="1" width="638" height="438" rx="10" fill="#EBEEEC" stroke="#C4CDC9"/>
  <text x="320" y="30" text-anchor="middle" font-family="-apple-system, 'Helvetica Neue', 'Segoe UI', Arial, sans-serif"
        font-size="13" letter-spacing="2" fill="#47555A">THE CREATIVE PROBLEM SOLVING PROCESS</text>

  <!-- assess hub connectors (drawn first, under the boxes) -->
  <g stroke="#7E8B87" stroke-width="1.5" stroke-dasharray="3 5">
    <line x1="255" y1="165" x2="285" y2="192"/>
    <line x1="385" y1="165" x2="355" y2="192"/>
    <line x1="385" y1="275" x2="355" y2="248"/>
    <line x1="255" y1="275" x2="285" y2="248"/>
  </g>

  <!-- cycle arrows -->
  <g stroke="#47555A" stroke-width="2.5" fill="none">
    <line x1="270" y1="108" x2="362" y2="108" marker-end="url(#arw)"/>
    <line x1="492" y1="176" x2="492" y2="256" marker-end="url(#arw)"/>
    <line x1="370" y1="332" x2="278" y2="332" marker-end="url(#arw)"/>
    <line x1="148" y1="264" x2="148" y2="184" marker-end="url(#arw)"/>
  </g>

  <!-- stage boxes -->
  <g font-family="-apple-system, 'Helvetica Neue', 'Segoe UI', Arial, sans-serif">
    <!-- 1 Clarify (top-left) -->
    <g>
      <rect x="38" y="48" width="220" height="120" rx="8" fill="#E2E7E4" stroke="#7E8B87" stroke-width="1.5"/>
      <text x="148" y="80" text-anchor="middle" font-size="19" font-weight="700" fill="#161D20">1 · Clarify</text>
      <g transform="translate(118,92)">
        <polygon points="0,11 26,2 26,20" fill="#2FA0AC"/>
        <polygon points="34,2 34,20 60,11" fill="#C6763A"/>
      </g>
      <text x="148" y="146" text-anchor="middle" font-size="13" fill="#47555A">find the right problem</text>
    </g>
    <!-- 2 Ideate (top-right) -->
    <g>
      <rect x="382" y="48" width="220" height="120" rx="8" fill="#E2E7E4" stroke="#7E8B87" stroke-width="1.5"/>
      <text x="492" y="80" text-anchor="middle" font-size="19" font-weight="700" fill="#161D20">2 · Ideate</text>
      <g transform="translate(462,92)">
        <polygon points="0,11 26,2 26,20" fill="#2FA0AC"/>
        <polygon points="34,2 34,20 60,11" fill="#C6763A"/>
      </g>
      <text x="492" y="146" text-anchor="middle" font-size="13" fill="#47555A">find many answers</text>
    </g>
    <!-- 3 Develop (bottom-right) -->
    <g>
      <rect x="382" y="272" width="220" height="120" rx="8" fill="#E2E7E4" stroke="#7E8B87" stroke-width="1.5"/>
      <text x="492" y="304" text-anchor="middle" font-size="19" font-weight="700" fill="#161D20">3 · Develop</text>
      <g transform="translate(462,316)">
        <polygon points="0,11 26,2 26,20" fill="#2FA0AC"/>
        <polygon points="34,2 34,20 60,11" fill="#C6763A"/>
      </g>
      <text x="492" y="370" text-anchor="middle" font-size="13" fill="#47555A">make ideas strong</text>
    </g>
    <!-- 4 Implement (bottom-left) -->
    <g>
      <rect x="38" y="272" width="220" height="120" rx="8" fill="#E2E7E4" stroke="#7E8B87" stroke-width="1.5"/>
      <text x="148" y="304" text-anchor="middle" font-size="19" font-weight="700" fill="#161D20">4 · Implement</text>
      <g transform="translate(118,316)">
        <polygon points="0,11 26,2 26,20" fill="#2FA0AC"/>
        <polygon points="34,2 34,20 60,11" fill="#C6763A"/>
      </g>
      <text x="148" y="370" text-anchor="middle" font-size="13" fill="#47555A">turn ideas into action</text>
    </g>

    <!-- assess hub -->
    <g>
      <rect x="235" y="185" width="170" height="70" rx="8" fill="#0F1518"/>
      <text x="320" y="214" text-anchor="middle" font-size="16" font-weight="700" fill="#F2F5F4">Assess</text>
      <text x="320" y="236" text-anchor="middle" font-size="14" fill="#DDE4E3">the situation</text>
    </g>
  </g>
</svg>
